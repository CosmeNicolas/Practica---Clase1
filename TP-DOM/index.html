<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>TP DOM</title>
</head>
<body>
  <header>TP DOM</header>

  <main>
    <h1>TP práctico del DOM</h1>

    <section>
      <h2>Formulario de alumno</h2>

      <form id="alumnoForm">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        <br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" required>
        <br>

        <label for="asistencia">Asistencia (%):</label>
        <input type="number" id="asistencia" name="asistencia" min="0" max="100" required>
        <br>

        <label for="notas">Notas:</label>
        <input type="text" id="notas" name="notas" required>
        <br>

        <button type="submit" class="cargaNotas">
          Cargar notas
        </button>
      </form>

      <h3>Lista de alumnos</h3>

      <div class="tabs">
        <button class="tab-btn" data-filter="all">Todos</button>
        <button class="tab-btn" data-filter="aprobados">Aprobados</button>
        <button class="tab-btn" data-filter="desaprobados">Desaprobados</button>
      </div>

      <table id="tablaAlumnos">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Notas</th>
            <th>Asistencia</th>
            <th>Promedio</th>
            <th>Condición</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>

      <p id="estadoGeneral"></p>
    </section>


    <section>
      <h3>Buscar alumno</h3>
<input type="text" id="buscarNombre" placeholder="Nombre del alumno">
<button id="btnBuscar">Buscar</button>

<p id="resultadoBusqueda"></p>
    </section>
  </main>

  <footer>
    Todos los derechos reservados &copy; 2024
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
