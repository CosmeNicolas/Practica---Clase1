<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libreta Universitaria</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="contenedor">
    <section class="card">
      <h1>Libreta Universitaria</h1>
      <p class="subtitulo">Carga tus materias y notas</p>

      <div class="formulario">
        <label>Nombre del alumno</label>
        <input type="text" id="nombreAlumno" placeholder="Ej: Cosme Nicolás Mas" />

        <label>Materia</label>
        <input type="text" id="materia" placeholder="Ej: Programación I" />

        <div class="grupo-notas">
          <div>
            <label>Nota 1</label>
            <input type="number" id="nota1" min="0" max="10" placeholder="0 a 10" />
          </div>

          <div>
            <label>Nota 2</label>
            <input type="number" id="nota2" min="0" max="10" placeholder="0 a 10" />
          </div>
        </div>

        <button id="btnAgregar">Agregar materia</button>
        <button id="btnLimpiar" class="btn-limpiar">Limpiar libreta</button>
      </div>
    </section>

    <section class="card libreta">
      <h2>Datos del alumno</h2>
      <p id="alumnoMostrado" class="alumno-vacio">Todavía no se cargó un alumno</p>

      <h2>Materias cargadas</h2>

      <div class="tabla-contenedor">
        <table>
          <thead>
            <tr>
              <th>Materia</th>
              <th>Nota 1</th>
              <th>Nota 2</th>
              <th>Promedio</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tablaMaterias"></tbody>
        </table>
      </div>

      <p id="mensajeVacio" class="mensaje-vacio">No hay materias cargadas todavía.</p>
    </section>
  </main>

  <script src="libreta.js"></script>
</body>
</html>
